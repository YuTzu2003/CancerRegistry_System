{% extends "base.html" %}
{% block title %}首頁總覽｜癌症登記平台{% endblock %}
{% block page_title %}首頁總覽{% endblock %}

{% block content %}
<div class="page-head">
  <div>
    <h1>平台總覽</h1>
    <p class="lead">
      整合資料清洗、申報紀錄與統計分析，協助醫療機構提升癌症登記資料品質。
    </p>
  </div>
</div>

<div class="kpi-grid">
  <div class="kpi">
    <div class="label">已登錄個案數</div>
    <div class="value blue">12,486</div>
  </div>
  <div class="kpi cyan">
    <div class="label">資料完整率</div>
    <div class="value cyan">98.4%</div>
  </div>
  <div class="kpi amber">
    <div class="label">待處理異常</div>
    <div class="value amber">128</div>
  </div>
  <div class="kpi green">
    <div class="label">目前申報期</div>
    <div class="value" style="color: var(--success);">2025 Q2</div>
  </div>
</div>

<section class="card-flat">
  <div class="section-head">
    <h2><span class="dot"></span> 快速操作</h2>
    <span class="hint">常用功能入口</span>
  </div>
  <div class="section-body d-flex flex-wrap gap-2">
    <a href="{{ url_for('data_cleaning') }}" class="btn btn-primary">
      <i class="bi bi-funnel"></i> 前往資料清洗
    </a>
    <a href="{{ url_for('reports') }}" class="btn">
      <i class="bi bi-file-earmark-text"></i> 申報紀錄
    </a>
    <a href="{{ url_for('analytics') }}" class="btn">
      <i class="bi bi-bar-chart"></i> 統計分析
    </a>
  </div>
</section>
{% endblock %}
