<section class="card-flat" style="margin-bottom: 22px;">
  <div class="section-head">
    <h2><span class="dot" style="background:var(--warning)"></span> 資料上傳</h2>
  </div>
  <div class="section-body">
    <div class="upload-grid">
      <!-- 上傳區域 -->
      <div>
        <div class="upload-container-box d-flex flex-column justify-content-center">
          <form id="dashUploadForm" enctype="multipart/form-data" class="d-flex flex-column gap-3">
            <div class="p-4 border rounded-3 text-center upload-input-zone">
              <h6 class="fw-semibold text-dark mb-1">選擇資料檔案</h6>
              <p class="text-secondary small mb-3">僅接受 .xls 或 .xlsx 格式的 Excel 檔案</p>
              <input type="file" class="form-control form-control-sm mx-auto" id="dashFileInput" name="file" accept=".xls,.xlsx" style="max-width: 280px; font-size: 13px;">
            </div>
            <button class="btn btn-primary w-100 py-2 d-flex align-items-center justify-content-center gap-2" type="submit" id="btnDashUpload" style="font-size: 14px; font-weight: 500;">上傳檔案</button>
          </form>
        </div>
      </div>

      <!-- 檔案列表區域 -->
      <div>
        <div class="file-list-card">
          <div class="file-list-header">
            <h6 class="mb-0 fw-bold text-dark d-flex align-items-center gap-2">
              <i class="bi bi-folder2-open text-primary"></i>檔案清單
              {% if uploaded_files %}
              <span class="badge bg-secondary rounded-pill font-monospace" style="font-size: 11px;">{{ uploaded_files|length }}</span>
              {% endif %}
            </h6>
            <span class="text-secondary" style="font-size: 12px;">點選檔案進行查詢</span>
          </div>
          <div class="file-list-container">
            <div class="table-responsive" style="max-height: 250px;">
              <table class="table table-hover align-middle mb-0" id="dashFileList" style="font-size: 13.5px;">
                <thead class="table-light sticky-top">
                  <tr>
                    <th class="border-bottom fw-normal text-secondary ps-3">檔案名稱</th>
                    <th class="border-bottom fw-normal text-secondary" style="width: 160px;">上傳時間</th>
                    <th class="border-bottom fw-normal text-secondary text-end pe-3" style="width: 100px;">操作</th>
                  </tr>
                </thead>
                <tbody id="dashFileListBody">
                  {% if uploaded_files %}
                    {% for f in uploaded_files %}
                    <tr>
                      <td class="ps-3 py-2.5">
                        <div class="d-flex align-items-center gap-2">
                          <i class="bi bi-filetype-xlsx text-success fs-5"></i>
                          <a href="#" class="text-dark text-decoration-none file-display-name">{{ f.name }}</a>
                          <span class="status-badge-selected ms-2" style="font-size: 11px; padding: 1px 6px; border-radius: 4px; background: var(--blue-100); color: var(--blue-700); font-weight: 500; display: none;"><i class="bi bi-check"></i> 已選取</span>
                        </div>
                      </td>
                      <td class="text-secondary py-2.5">
                        {{ f.time }}
                      </td>
                      <td class="text-end pe-3 py-2.5">
                        <button type="button" class="btn btn-link text-danger p-0 border-0 btn-del-file" data-name="{{ f.name }}" style="font-size: 13px; text-decoration: none;"><i class="bi bi-trash me-1"></i>刪除</button>
                      </td>
                    </tr>
                    {% endfor %}
                  {% else %}
                    <tr id="noFileRow">
                      <td colspan="3" class="text-center text-muted py-5">
                        <i class="bi bi-inbox fs-2 d-block mb-2 opacity-50"></i>尚無已上傳的資料檔案
                      </td>
                    </tr>
                  {% endif %}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ── 分析條件設定卡片 ──────────────────────────── -->
<section class="card-flat" style="margin-bottom: 22px;">
  <div class="section-head">
    <div class="d-flex align-items-center">
      <h2 class="mb-0"><span class="dot" style="background:var(--warning)"></span> 篩選條件設定</h2>
    </div>
  </div>

  <div class="section-body p-4">

    <!-- 篩選條件列 -->
    <div class="filter-bar" style="padding: 0;">
      <div class="filter-group">
        <label>年度</label>
        <div class="d-flex align-items-center gap-2">
          <input type="number" id="filterYearStart" class="form-control px-2" placeholder="起始" style="width: 80px; text-align: center; min-width: 0;" oninput="if(this.value.length>4) this.value=this.value.slice(0,4);">
          <span class="text-secondary" style="font-size: 14px;">-</span>
          <input type="number" id="filterYearEnd" class="form-control px-2" placeholder="結束" style="width: 80px; text-align: center; min-width: 0;" oninput="if(this.value.length>4) this.value=this.value.slice(0,4);">
        </div>
      </div>
      <div class="filter-group">
        <label>性態碼</label>
        <select id="filterBehavior" style="min-width: 130px;" disabled>
          <option value="" disabled selected>請選擇性態碼</option>
          <option value="all">全部</option>
          <option value="in_situ">原位癌</option>
          <option value="invasive">侵襲癌</option>
        </select>
      </div>
      <div class="filter-group">
        <label>癌別</label>
        <button type="button" class="form-select text-start d-flex justify-content-between align-items-center" data-bs-toggle="modal" data-bs-target="#cancerPickerModal" style="width: 100%; min-width: 220px;" id="btnCancerPicker" disabled>
          <span id="btnCancerPickerText">所有癌別</span>
        </button>
      </div>
    </div>

    <!-- 主類別列 (標題按鈕) -->
    <div id="mainCategoryArea">
      <hr class="my-4 border-secondary-subtle">
      
      <!-- 分析主題列 -->
      <div class="d-flex align-items-center mb-1">
        <h6 class="mb-0 fw-bold text-dark me-3" style="flex-shrink: 0;">分析主題：</h6>
        <div class="d-flex flex-wrap gap-2">
          <input class="btn-check group-checkbox" type="radio" name="mainCategoryTab" id="chkGroupIncidence" data-group="incidence" disabled>
          <label class="cat-btn-label" for="chkGroupIncidence"><i class="bi bi-graph-up-arrow me-1"></i> 發生率</label>
          
          <input class="btn-check group-checkbox" type="radio" name="mainCategoryTab" id="chkGroupDiagnosis" data-group="diagnosis" disabled>
          <label class="cat-btn-label" for="chkGroupDiagnosis"><i class="bi bi-clipboard2-pulse me-1"></i> 診斷</label>
          
          <input class="btn-check group-checkbox" type="radio" name="mainCategoryTab" id="chkGroupStage" data-group="stage" disabled>
          <label class="cat-btn-label" for="chkGroupStage"><i class="bi bi-layers me-1"></i> 期別</label>
          
          <input class="btn-check group-checkbox" type="radio" name="mainCategoryTab" id="chkGroupTreatment" data-group="treatment" disabled>
          <label class="cat-btn-label" for="chkGroupTreatment"><i class="bi bi-capsule me-1"></i> 治療方式</label>
          
          <input class="btn-check group-checkbox" type="radio" name="mainCategoryTab" id="chkGroupCrossYear" data-group="cross_year" disabled>
          <label class="cat-btn-label" for="chkGroupCrossYear"><i class="bi bi-calendar3 me-1"></i> 跨年度分析</label>
        </div>
      </div>

      <!-- 分析子項目列 -->
      <div class="d-flex align-items-center mt-3">
        <div class="me-3" style="width: 120px; flex-shrink: 0;"></div>
        <div class="d-flex flex-wrap gap-2 w-100 align-items-center">
          
          <!-- 發生率 細項 -->
          <div id="subItems-incidence" class="d-none d-flex flex-wrap gap-3">
            <div class="form-check">
              <input class="form-check-input item-checkbox" type="checkbox" name="subTab_incidence" id="chkIncidenceAge" data-parent="incidence" value="性別年齡分佈" data-target="#chartPane-IncidenceAge" disabled>
              <label class="form-check-label text-dark" for="chkIncidenceAge" style="cursor: pointer;">性別年齡分佈</label>
            </div>
            <div class="form-check">
              <input class="form-check-input item-checkbox" type="checkbox" name="subTab_incidence" id="chkIncidenceCommon" data-parent="incidence" value="本院常見癌症" data-target="#chartPane-IncidenceCommon" disabled>
              <label class="form-check-label text-dark" for="chkIncidenceCommon" style="cursor: pointer;">本院常見癌症</label>
            </div>
            <div class="form-check">
              <input class="form-check-input item-checkbox" type="checkbox" name="subTab_incidence" id="chkIncidenceMedian" data-parent="incidence" value="年齡中位數" data-target="#chartPane-IncidenceMedian" disabled>
              <label class="form-check-label text-dark" for="chkIncidenceMedian" style="cursor: pointer;">年齡中位數</label>
            </div>
          </div>

          <!-- 診斷 細項 -->
          <div id="subItems-diagnosis" class="d-none d-flex flex-wrap gap-3">
            <div class="form-check">
              <input class="form-check-input item-checkbox" type="checkbox" name="subTab_diagnosis" id="chkDiagnosisAnalyzable" data-parent="diagnosis" value="可分析個案與確診個案" disabled>
              <label class="form-check-label text-dark" for="chkDiagnosisAnalyzable" style="cursor: pointer;">可分析個案與確診個案</label>
            </div>
            <div class="form-check">
              <input class="form-check-input item-checkbox" type="checkbox" name="subTab_diagnosis" id="chkDiagnosisHistology" data-parent="diagnosis" value="組織型態" disabled>
              <label class="form-check-label text-dark" for="chkDiagnosisHistology" style="cursor: pointer;">組織型態</label>
            </div>
            <div class="form-check">
              <input class="form-check-input item-checkbox" type="checkbox" name="subTab_diagnosis" id="chkDiagnosisClassification" data-parent="diagnosis" value="個案分類" disabled>
              <label class="form-check-label text-dark" for="chkDiagnosisClassification" style="cursor: pointer;">個案分類</label>
            </div>
          </div>

          <!-- 期別 細項 -->
          <div id="subItems-stage" class="d-none d-flex flex-wrap gap-3">
            <div class="form-check">
              <input class="form-check-input item-checkbox" type="checkbox" name="subTab_stage" id="chkStageDistribution" data-parent="stage" value="期別分佈" disabled>
              <label class="form-check-label text-dark" for="chkStageDistribution" style="cursor: pointer;">期別分佈</label>
            </div>
          </div>

          <!-- 治療方式 細項 -->
          <div id="subItems-treatment" class="d-none d-flex flex-wrap gap-3">
            <div class="form-check">
              <input class="form-check-input item-checkbox" type="checkbox" name="subTab_treatment" id="chkTreatmentStats" data-parent="treatment" value="治療方式統計" disabled>
              <label class="form-check-label text-dark" for="chkTreatmentStats" style="cursor: pointer;">治療方式統計</label>
            </div>
          </div>

          <!-- 跨年度分析 細項 -->
          <div id="subItems-cross_year" class="d-none d-flex flex-wrap gap-3">
            <div class="form-check">
              <input class="form-check-input item-checkbox" type="checkbox" name="subTab_cross" id="chkCrossYearSurvival" data-parent="cross_year" value="存活率" disabled>
              <label class="form-check-label text-dark" for="chkCrossYearSurvival" style="cursor: pointer;">存活率</label>
            </div>
            <div class="form-check">
              <input class="form-check-input item-checkbox" type="checkbox" name="subTab_cross" id="chkCrossYearMedianAge" data-parent="cross_year" value="歷年年齡中位數" disabled>
              <label class="form-check-label text-dark" for="chkCrossYearMedianAge" style="cursor: pointer;">歷年年齡中位數</label>
            </div>
            <div class="form-check">
              <input class="form-check-input item-checkbox" type="checkbox" name="subTab_cross" id="chkCrossYearStage" data-parent="cross_year" value="歷年期別分佈" disabled>
              <label class="form-check-label text-dark" for="chkCrossYearStage" style="cursor: pointer;">歷年期別分佈</label>
            </div>
            <div class="form-check">
              <input class="form-check-input item-checkbox" type="checkbox" name="subTab_cross" id="chkCrossYearNewCases" data-parent="cross_year" value="歷年新診斷件數" disabled>
              <label class="form-check-label text-dark" for="chkCrossYearNewCases" style="cursor: pointer;">歷年新診斷件數</label>
            </div>
          </div>
          
        </div>
      </div>
    </div>

    <!-- 動作按鈕列 -->
    <div class="d-flex justify-content-end align-items-center gap-2 mt-4 pt-4 border-top border-secondary-subtle flex-wrap">
      <div class="d-flex align-items-center gap-1 bg-light px-2 py-1 rounded border border-secondary-subtle">
        <label class="fw-bold text-dark mb-0 me-1" style="font-size: 13px;" for="favPresetSelect"><i class="bi bi-star-fill text-warning"></i> 我的最愛：</label>
        <select id="favPresetSelect" class="form-select form-select-sm border-0 bg-transparent" style="width: 160px; font-size: 13px; padding: 2px 5px; box-shadow: none;" disabled>
          <option value="">— 載入中... —</option>
        </select>
        <button type="button" id="btnRenamePreset" class="btn btn-sm btn-light text-secondary rounded-circle" style="display: none; width: 26px; height: 26px; padding: 0;" title="重新命名範本">
          <i class="bi bi-pencil" style="font-size: 12px;"></i>
        </button>
        <button type="button" id="btnDeletePreset" class="btn btn-sm btn-light text-danger rounded-circle" style="display: none; width: 26px; height: 26px; padding: 0;" title="刪除範本">
          <i class="bi bi-trash" style="font-size: 12px;"></i>
        </button>
      </div>
      <button type="button" id="btnSavePreset" class="btn btn-warning text-dark d-flex justify-content-center align-items-center gap-2" style="padding: 7px 16px; font-size: 14px; height: 38px; border: none; border-radius: var(--radius-sm);" disabled>
        <i class="bi bi-star"></i> 加入最愛
      </button>
      <button id="btnRunQuery" class="btn-black d-flex justify-content-center align-items-center gap-2" type="button" style="padding: 7px 16px; font-size: 14px; height: 38px; border-radius: var(--radius-sm);">
        <i class="bi bi-search"></i> 查詢
      </button>
      <button id="btnResetFilters" class="btn-black-outline d-flex justify-content-center align-items-center gap-2" type="button" style="padding: 7px 16px; font-size: 14px; height: 38px; border-radius: var(--radius-sm);">
        <i class="bi bi-arrow-counterclockwise"></i> 重置
      </button>
    </div>

  </div>
</section>

<!-- ── Cancer Picker Modal ──────────────────────────────── -->
<div class="modal fade" id="cancerPickerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header bg-light border-bottom">
        <h5 class="modal-title fw-bold" style="font-size: 16px;"><i class="bi bi-ui-checks-grid me-2 text-primary"></i>選擇癌別</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-0">
        <div class="row g-0 h-100" style="min-height: 450px;">
          <!-- Left Pane (Categories) -->
          <div class="col-md-4 border-end bg-light">
            <div class="list-group list-group-flush" id="cancerCategoryList" style="max-height: 60vh; overflow-y: auto; font-size: 14px;">
              <!-- Categories injected via JS -->
            </div>
          </div>
          <!-- Right Pane (Details) -->
          <div class="col-md-8 bg-white">
            <div class="p-4" id="cancerDetailList" style="max-height: 60vh; overflow-y: auto; font-size: 14px;">
              <!-- Checkboxes injected via JS -->
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer bg-light border-top d-flex justify-content-between align-items-center">
        <div class="text-muted fw-medium" id="cancerPickerStatus" style="font-size: 14px;">已選取：0 項</div>
        <div>
          <button type="button" class="btn btn-light border-secondary-subtle" data-bs-dismiss="modal">取消</button>
          <button type="button" class="btn btn-primary px-4 ms-2" id="btnConfirmCancer">確認選取</button>
        </div>
      </div>
    </div>
  </div>
</div>


<script src="{{ url_for('static', filename='js/control.js') }}"></script>
